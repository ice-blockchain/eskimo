development: true
logger:
  encoder: console
  level: debug
cmd/eskimo:
  host: localhost
  version: local
  defaultEndpointTimeout: 30s
  httpServer:
    port: 443
    certPath: cmd/eskimo/.testdata/localhost.crt
    keyPath: cmd/eskimo/.testdata/localhost.key
  defaultPagination:
    limit: 20
    maxLimit: 1000