development: true
logger:
  encoder: console
  level: debug
cmd/eskimo:
  host: localhost
  version: local
  defaultEndpointTimeout: 30s
  httpServer:
    port: 443
    certPath: cmd/eskimo/.testdata/localhost.crt
    keyPath: cmd/eskimo/.testdata/localhost.key
  defaultPagination:
    limit: 20
    maxLimit: 1000
users:
  db:
    spaces:
      - USERS
    urls:
      - localhost:3301
    user: admin
    password: pass
  messageBroker:
    #It's not used, because we`re not consuming anything in the production code.
    #So, its configured here just for testing or other local purposes.
    consumerGroup: eskimo-users
    createTopics: true
    urls:
      - localhost:9092
    topics:
      - name: users-events
        partitions: 10
        replicationFactor: 1
        retention: 1000h
