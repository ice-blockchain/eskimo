basePath: /v1
definitions:
  CreateUserRequestBody:
    properties:
      email:
        example: jdoe@gmail.com
        type: string
      phoneNumber:
        example: "+12099216581"
        type: string
      phoneNumberHash:
        example: Ef86A6021afCDe5673511376B2
        type: string
      referredBy:
        example: did:ethr:0x4B73C58370AEfcEf86A6021afCDe5673511376B2
        type: string
      username:
        example: jdoe
        type: string
    type: object
  ValidatePhoneNumberRequestBody:
    properties:
      createdAt:
        description: '`Read Only`.'
        example: "2022-01-03T16:20:52.156534Z"
        type: string
      phoneNumber:
        example: "+12345678"
        type: string
      phoneNumberHash:
        example: Ef86A6021afCDe5673511376B2
        type: string
      userId:
        example: did:ethr:0x4B73C58370AEfcEf86A6021afCDe5673511376B2
        type: string
      validationCode:
        example: "1234"
        type: string
    type: object
  devicesettings.NotificationChannels:
    properties:
      email:
        example: false
        type: boolean
      push:
        example: true
        type: boolean
    type: object
  devicesettings.NotificationSettings:
    additionalProperties:
      $ref: '#/definitions/devicesettings.NotificationChannels'
    type: object
  server.ErrorResponse:
    properties:
      code:
        example: SOMETHING_NOT_FOUND
        type: string
      data:
        additionalProperties: true
        type: object
      error:
        example: something is missing
        type: string
    type: object
  users.DeviceLocation:
    properties:
      city:
        example: New York
        type: string
      country:
        example: US
        type: string
    type: object
  users.DeviceMetadata:
    properties:
      apiLevel:
        type: integer
      baseOS:
        type: string
      bootloader:
        type: string
      brand:
        type: string
      buildId:
        type: string
      carrier:
        type: string
      codename:
        type: string
      device:
        type: string
      deviceId:
        type: string
      deviceName:
        type: string
      deviceType:
        type: string
      deviceUniqueId:
        example: FCDBD8EF-62FC-4ECB-B2F5-92C9E79AC7F9
        type: string
      emulator:
        type: boolean
      fingerprint:
        type: string
      firstInstallTime:
        type: string
      hardware:
        type: string
      installerPackageName:
        type: string
      instanceId:
        type: string
      lastUpdateTime:
        type: string
      manufacturer:
        type: string
      pinOrFingerprintSet:
        type: boolean
      product:
        type: string
      pushNotificationToken:
        type: string
      readableVersion:
        type: string
      systemName:
        type: string
      systemVersion:
        type: string
      tablet:
        type: boolean
      tags:
        type: string
      type:
        type: string
      userAgent:
        type: string
      userId:
        example: did:ethr:0x4B73C58370AEfcEf86A6021afCDe5673511376B2
        type: string
    type: object
  users.DeviceSettings:
    properties:
      deviceUniqueId:
        example: FCDBD8EF-62FC-4ECB-B2F5-92C9E79AC7F9
        type: string
      language:
        description: Optional.
        example: en
        type: string
      notificationSettings:
        $ref: '#/definitions/devicesettings.NotificationSettings'
        description: Optional.
      updatedAt:
        description: '`Read Only`.'
        example: "2022-01-03T16:20:52.156534Z"
        type: string
      userId:
        example: did:ethr:0x4B73C58370AEfcEf86A6021afCDe5673511376B2
        type: string
    type: object
  users.User:
    properties:
      agendaPhoneNumberHashes:
        example: Ef86A6021afCDe5673511376B2,Ef86A6021afCDe5673511376B2,Ef86A6021afCDe5673511376B2,Ef86A6021afCDe5673511376B2
        type: string
      city:
        example: New York
        type: string
      country:
        example: US
        type: string
      createdAt:
        example: "2022-01-03T16:20:52.156534Z"
        type: string
      email:
        example: jdoe@gmail.com
        type: string
      firstName:
        example: John
        type: string
      id:
        example: did:ethr:0x4B73C58370AEfcEf86A6021afCDe5673511376B2
        type: string
      lastMiningStartedAt:
        example: "2022-01-03T16:20:52.156534Z"
        type: string
      lastName:
        example: Doe
        type: string
      lastPingAt:
        example: "2022-01-03T16:20:52.156534Z"
        type: string
      phoneNumber:
        example: "+12099216581"
        type: string
      phoneNumberHash:
        example: Ef86A6021afCDe5673511376B2
        type: string
      profilePictureURL:
        example: https://somecdn.com/p1.jpg
        type: string
      referredBy:
        example: did:ethr:0x4B73C58370AEfcEf86A6021afCDe5673511376B2
        type: string
      updatedAt:
        example: "2022-01-03T16:20:52.156534Z"
        type: string
      username:
        example: jdoe
        type: string
    type: object
info:
  contact:
    name: ice.io
    url: https://ice.io
  description: API that handles everything related to write only operations for user's
    account, user's devices and statistics about those accounts and devices.
  title: User Accounts, User Devices, User Statistics API
  version: latest
paths:
  /user-validations/{userId}/phone-number:
    put:
      consumes:
      - application/json
      description: Validates a provided phone number by a one time code previously
        provided to the user via SMS.
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID of the user
        in: path
        name: userId
        required: true
        type: string
      - description: Request params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ValidatePhoneNumberRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: ok
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: if not allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: phone number is not in the process of validation or user not
            found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Validations
  /users:
    post:
      consumes:
      - application/json
      description: Creates an user account
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Request params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/CreateUserRequestBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/users.User'
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: user already exists with that ID or with that username
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Accounts
  /users/{userId}:
    delete:
      consumes:
      - application/json
      description: Deletes an user account
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID of the User
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK - found and deleted
        "204":
          description: No Content - already deleted
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: not allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Accounts
    patch:
      consumes:
      - multipart/form-data
      description: Modifies an user account
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID of the user
        in: path
        name: userId
        required: true
        type: string
      - description: Optional. Example:"Ef86A6021afCDe5673511376B2,Ef86A6021afCDe5673511376B2,Ef86A6021afCDe5673511376B2,Ef86A6021afCDe5673511376B2".
        in: formData
        name: agendaPhoneNumberHashes
        type: string
      - description: Optional. Example:"New York".
        in: formData
        name: city
        type: string
      - description: Optional. Example:"US".
        in: formData
        name: country
        type: string
      - description: Optional. Example:"jdoe@gmail.com".
        in: formData
        name: email
        type: string
      - description: Optional. Required only if `lastName` is set. Example:"John".
        in: formData
        name: firstName
        type: string
      - description: Optional. Required only if `firstName` is set.  Example:"Doe".
        in: formData
        name: lastName
        type: string
      - description: Optional. Example:"+12099216581".
        in: formData
        name: phoneNumber
        type: string
      - description: Optional. Required only if `phoneNumber` is set. Example:"Ef86A6021afCDe5673511376B2".
        in: formData
        name: phoneNumberHash
        type: string
      - description: Example:"jdoe".
        in: formData
        name: username
        type: string
      - description: The new profile picture for the user
        in: formData
        name: profilePicture
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.User'
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: not allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "404":
          description: user is not found
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "409":
          description: if username conflicts with another other user's
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Accounts
  /users/{userId}/devices/{deviceUniqueId}/metadata:
    put:
      consumes:
      - application/json
      description: Replaces existing device metadata with the provided one.
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID of the user
        in: path
        name: userId
        required: true
        type: string
      - description: ID of the device
        in: path
        name: deviceUniqueId
        required: true
        type: string
      - description: Request params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.DeviceMetadata'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: if not allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Devices
  /users/{userId}/devices/{deviceUniqueId}/metadata/location:
    put:
      consumes:
      - application/json
      description: Returns the device's geolocation based on its IP or based on account
        information if userId is also provided.
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token. Required only if userId is set
        in: header
        name: Authorization
        type: string
      - description: ID of the user. Is optional, set an `-` if none.
        in: path
        name: userId
        required: true
        type: string
      - description: ID of the device
        in: path
        name: deviceUniqueId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/users.DeviceLocation'
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authenticated
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: if not allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Devices
  /users/{userId}/devices/{deviceUniqueId}/settings:
    patch:
      consumes:
      - application/json
      description: Modifies only specific device settings provided in the request
        body.
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      - description: ID of the user
        in: path
        name: userId
        required: true
        type: string
      - description: ID of the device
        in: path
        name: deviceUniqueId
        required: true
        type: string
      - description: Request params
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/users.DeviceSettings'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: if validations fail
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "401":
          description: if not authorized
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "403":
          description: if not allowed
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "422":
          description: if syntax fails
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrorResponse'
        "504":
          description: if request times out
          schema:
            $ref: '#/definitions/server.ErrorResponse'
      tags:
      - Devices
schemes:
- https
swagger: "2.0"
